<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dannielle's 18th Birthday | A Night of Radiance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --gold: #C5A059;
            /* Shimmering Rose Gold Background */
            --rose-gold: linear-gradient(135deg, #f7d7d7 0%, #e9baba 50%, #c98a8a 100%);
            --cream: #FAF9F6;
            --deep-brown: #2D241E; /* Darker text for elegance and contrast */
            
            /* New Nude/Pinkish/Brown Palette */
            --nude-pink: #EAD7D1;
            --dusty-rose: #D4A5A5;
            --warm-taupe: #B8978A;
            --cedar-brown: #8D6E63;
        }

        body {
            margin: 0; padding: 0;
            background: var(--rose-gold);
            background-attachment: fixed;
            color: var(--deep-brown);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: relative;
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .flower-border {
            position: absolute;
            width: 350px;
            height: 350px;
            background-image: url('https://www.transparentpng.com/download/floral/black-floral-frame-free-download-2.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 5;
            filter: brightness(1.5) sepia(0.5); 
            animation: floralFloat 10s ease-in-out infinite;
        }
        
        .top-left { top: -60px; left: -60px; transform: rotate(180deg); }
        .top-right { top: -60px; right: -60px; transform: rotate(270deg); }
        .bottom-left { bottom: -60px; left: -60px; transform: rotate(90deg); }
        .bottom-right { bottom: -60px; right: -60px; }

        @keyframes floralFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        h1.main-name { 
            font-family: 'Cinzel', serif; 
            font-size: clamp(2.5rem, 10vw, 4.5rem); 
            margin: 10px 0; 
            letter-spacing: 12px;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        .hero-divider {
            width: 300px;
            height: 2px;
            background: var(--gold);
            margin: 25px 0;
        }

        /* --- MAP SECTION (Lightened) --- */
        .info-card { padding: 80px 20px; background-color: rgba(255, 255, 255, 0.95); }
        .resort-name { color: var(--gold); font-size: 1.8rem; letter-spacing: 4px; font-family: 'Cinzel', serif; margin-bottom: 10px;}
        
        .map-frame {
            width: 100%; max-width: 900px; height: 450px;
            margin: 40px auto; border: 1px solid var(--nude-pink); border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* --- DRESS CODE --- */
        .dress-code-section { padding: 100px 20px; max-width: 800px; margin: 0 auto; }
        .palette { display: flex; justify-content: center; gap: 20px; margin: 40px 0; flex-wrap: wrap; }
        .swatch { 
            width: 75px; height: 75px; border-radius: 50%; 
            border: 4px solid white; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
        }

        .code-content { border-top: 1px solid rgba(255,255,255,0.5); border-bottom: 1px solid rgba(255,255,255,0.5); padding: 50px 0; }
        .code-content h3 { font-family: 'Cinzel'; color: var(--deep-brown); letter-spacing: 6px; font-size: 2rem; margin-top: 0; }

        /* --- RSVP --- */
        .rsvp-section {
            background-color: var(--deep-brown);
            color: white;
            padding: 80px 30px; border-radius: 60px 60px 0 0;
            max-width: 700px; margin: 0 auto;
        }
        input, select {
            width: 100%; background: var(--cream); border: none; padding: 20px;
            font-size: 1rem; border-radius: 8px; box-sizing: border-box; margin-bottom: 25px;
        }
        .submit-btn {
            background-color: var(--gold); color: white; border: none; padding: 22px;
            width: 100%; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; cursor: pointer;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <div class="flower-border top-left"></div>
        <div class="flower-border top-right"></div>
        <div class="flower-border bottom-left"></div>
        <div class="flower-border bottom-right"></div>
        
        <p style="letter-spacing: 5px; color: var(--deep-brown); font-weight: 600;">YOU ARE CORDIALLY INVITED TO</p>
        <h1 class="main-name">DANNIELLE'S</h1>
        <h1 class="main-name" style="margin-top:-10px">18TH BIRTHDAY</h1>
        <div class="hero-divider"></div>
        <p style="font-size: 1.1rem; letter-spacing: 12px; color: var(--deep-brown); font-weight: 600;">MAY 09, 2026</p>
    </header>

    <section class="info-card">
        <div class="resort-name">PARINI PRIVATE RESORT</div>
        <p style="font-size: 1rem; color: #666; letter-spacing: 1px;">44 Atis St. Aurora Subdivision, Angono, Rizal</p>

        <div class="map-frame">
            <iframe width="100%" height="100%" frameborder="0" style="border:0"

            </iframe>
